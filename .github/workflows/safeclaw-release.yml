name: SafeClaw Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to publish, for example safeclaw-v0.1.1"
        required: true
        type: string
  push:
    tags:
      - "safeclaw-v*"

permissions:
  contents: write

concurrency:
  group: safeclaw-release-${{ github.event.inputs.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: apps/safeclaw

    env:
      SAFECLAW_UPDATER_ENDPOINTS: "https://github.com/A3S-Lab/SafeClaw/releases/latest/download/latest.json"
      SAFECLAW_UPDATER_PUBKEY: ${{ secrets.SAFECLAW_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      SAFECLAW_REQUIRE_BOX_RESOURCES: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate updater secrets
        shell: bash
        run: |
          test -n "$SAFECLAW_UPDATER_PUBKEY" || { echo "Missing SAFECLAW_UPDATER_PUBKEY" >&2; exit 1; }
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "Missing TAURI_SIGNING_PRIVATE_KEY" >&2; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/safeclaw/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/safeclaw/src-tauri -> target
            apps/safeclaw/crates/safeclaw -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate updater release config
        run: |
          node -e '
          const fs = require("fs");
          const pubkey = process.env.SAFECLAW_UPDATER_PUBKEY;
          if (!pubkey) throw new Error("SAFECLAW_UPDATER_PUBKEY is required");
          const endpoints = (process.env.SAFECLAW_UPDATER_ENDPOINTS || "")
            .split(/[,\n;]+/)
            .map((value) => value.trim())
            .filter(Boolean);
          if (!endpoints.length) throw new Error("SAFECLAW_UPDATER_ENDPOINTS is required");
          const config = {
            plugins: {
              updater: {
                pubkey,
                endpoints
              }
            }
          };
          fs.writeFileSync(
            "src-tauri/tauri.release.conf.json",
            JSON.stringify(config, null, 2) + "\n"
          );
          '

      - name: Publish Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAFECLAW_UPDATER_ENDPOINTS: ${{ env.SAFECLAW_UPDATER_ENDPOINTS }}
          SAFECLAW_UPDATER_PUBKEY: ${{ env.SAFECLAW_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SAFECLAW_REQUIRE_BOX_RESOURCES: ${{ env.SAFECLAW_REQUIRE_BOX_RESOURCES }}
        with:
          projectPath: apps/safeclaw
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: "SafeClaw v__VERSION__"
          releaseBody: "SafeClaw desktop release with signed Tauri updater artifacts."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: ${{ matrix.target == 'x86_64-apple-darwin' || matrix.target == 'x86_64-pc-windows-msvc' }}
          uploadUpdaterSignatures: true
          args: --config src-tauri/tauri.release.conf.json --target ${{ matrix.target }}
