name: A3S ACL Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to publish, for example acl-v0.2.0"
        required: true
        type: string
      publish_npm:
        description: "Publish Node package to npm after creating the GitHub release"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "acl-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: acl-release-${{ github.event.inputs.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag and package versions
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name }}"
          if [[ ! "$TAG_NAME" =~ ^acl-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Expected tag format acl-vX.Y.Z, got: $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/acl/Cargo.toml | head -n 1)"
          NODE_VERSION="$(node -p "require('./crates/acl/sdk/node/package.json').version")"

          test "$VERSION" = "$CARGO_VERSION"
          test "$VERSION" = "$NODE_VERSION"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: validate-version
    defaults:
      run:
        working-directory: crates/acl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/acl -> target

      - name: Run ACL tests
        run: cargo test -p a3s-acl

  publish-github-release:
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.tag_name }}
          name: A3S ACL v${{ needs.validate-version.outputs.version }}
          generate_release_notes: true
          files: |
            crates/acl/sdk/node/dist/**/*

  publish-npm:
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - publish-github-release
    if: github.event_name == 'push' || inputs.publish_npm == true
    environment:
      name: npm
    defaults:
      run:
        working-directory: crates/acl/sdk/node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: crates/acl/sdk/node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
